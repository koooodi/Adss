<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .quiz-container {
            position: relative;
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .quiz-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .hidden-link-bg {
            position: absolute;
            top: 15%;
            left: 5%;
            width: 90%;
            color: #000000;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            user-select: text;
            z-index: 1;
        }

        ::selection { 
            background: #002244; 
            color: #00ffcc; 
        }
        ::-webkit-selection { 
            background: #002244; 
            color: #00ffcc; 
        }

        .audio-controls {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            background: rgba(10, 10, 10, 0.85);
            padding: 12px 25px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
        }

        .btn {
            background: none;
            border: none;
            color: #555;
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s;
        }

        .btn:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hidden-link-bg">
// CRITICAL BYPASS DETECTED. DIRECT ROUTE TO DATA STORAGE MIRROR ACQUIRED:
// BACKUP VAULT LINK: https://t.me/Caesar_Visionary_Photos/12
// DECRYPTING KEY AT STATUS_INDEX... TARGET ACCESS CODE NEEDED.
    </div>

    <div class="quiz-container">
        <img src="mid.jpg" alt="Core" class="quiz-image">

        <div class="audio-controls">
            <button class="btn" id="playBtn">▶ PLAY</button>
            <a href="sound.wav" download="sound.wav" class="btn">⬇ DOWNLOAD</a>
        </div>
    </div>

    <audio id="audioTrack" src="sound.wav"></audio>

    <script>
        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸ PAUSE';
            } else {
                audio.pause();
                playBtn.textContent = '▶ PLAY';
            }
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶ PLAY';
        });
    </script>

</body>
</html>
