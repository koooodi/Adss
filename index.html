<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ФОН НА ВЕСЬ ЭКРАН */
        .quiz-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .quiz-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Полностью заполняет экран телефона */
            display: block;
            pointer-events: none;
        }

        /* СКРЫТАЯ ССЫЛКА НА ТГК В ЦВЕТ ФОНА (Должна быть в поле зрения) */
        .hidden-link-bg {
            position: absolute;
            bottom: 25%; /* Находится чуть выше плеера, прямо в поле зрения смартфона */
            left: 0;
            width: 100%;
            text-align: center;
            color: #000000; /* Абсолютно невидима на черном */
            font-size: 14px;
            user-select: text;
            z-index: 1;
        }

        /* ХАКЕРСКАЯ ПОДСВЕТКА */
        ::selection { 
            background: #002244; 
            color: #00ffcc; 
        }
        ::-webkit-selection { 
            background: #002244; 
            color: #00ffcc; 
        }

        /* ИНТЕРФЕЙС ПЛЕЕРА И КНОПКИ СКАЧАТЬ (СНИЗУ ПОВЕРХ ФОНА) */
        .audio-controls {
            position: absolute;
            bottom: 10%; /* Четко снизу экрана телефона */
            display: flex;
            gap: 30px;
            background: rgba(10, 10, 10, 0.85);
            padding: 12px 25px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
        }

        .btn {
            background: none;
            border: none;
            color: #555;
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover, .btn:active {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hidden-link-bg">https://t.me/Caesar_Visionary_Photos</div>

    <div class="quiz-container">
        <img src="mid.jpg" alt="Core" class="quiz-image">

        <div class="audio-controls">
            <button class="btn" id="playBtn">▷ PLAY</button>
            <a href="sound.wav" download="sound.wav" class="btn">⬇ DOWNLOAD</a>
        </div>
    </div>

    <audio id="audioTrack" src="sound.wav"></audio>

    <script>
        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '|| PAUSE';
            } else {
                audio.pause();
                playBtn.textContent = '▷ PLAY';
            }
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▷ PLAY';
        });
    </script>

</body>
</html>
