<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* АДАПТИВНЫЙ КОНТЕЙНЕР ДЛЯ МОБИЛОК */
        .quiz-container {
            position: relative;
            width: 90vw;
            max-width: 400px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Картинка подстраивается под высоту и ширину экрана смартфона */
        .quiz-image {
            width: 100%;
            max-height: 65vh;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }

        /* ЧИСТАЯ ССЫЛКА В ЦВЕТ ФОНА ДЛЯ CTRL+A */
        .hidden-link-bg {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            color: #000000;
            font-size: 14px;
            white-space: pre-wrap;
            user-select: text;
            z-index: 1;
        }

        /* ПОДСВЕТКА ВЫДЕЛЕНИЯ */
        ::selection { 
            background: #002244; 
            color: #00ffcc; 
        }
        ::-webkit-selection { 
            background: #002244; 
            color: #00ffcc; 
        }

        /* КНОПКИ УПРАВЛЕНИЯ (ВСЕГДА ВИДИМЫ НА ЭКРАНЕ) */
        .audio-controls {
            margin-top: 15px;
            display: flex;
            gap: 25px;
            background: rgba(15, 15, 15, 0.9);
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid #111;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-around;
        }

        .btn {
            background: none;
            border: none;
            color: #666;
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            padding: 5px 10px;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent; /* Убирает синий блик при тапе на смартфонах */
        }

        .btn:hover, .btn:active {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Только чистая ложная ссылка без лишнего текста -->
    <div class="hidden-link-bg">https://t.me/Caesar_Visionary_Photos</div>

    <div class="quiz-container">
        <img src="mid.jpg" alt="Core" class="quiz-image">

        <div class="audio-controls">
            <button class="btn" id="playBtn">▶ PLAY</button>
            <a href="sound.wav" download="sound.wav" class="btn">⬇ DOWNLOAD</a>
        </div>
    </div>

    <audio id="audioTrack" src="sound.wav"></audio>

    <script>
        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸ PAUSE';
            } else {
                audio.pause();
                playBtn.textContent = '▶ PLAY';
            }
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶ PLAY';
        });
    </script>

</body>
</html>
