<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* КОМПАКТНЫЙ КОНТЕЙНЕР ДЛЯ СМАРТФОНОВ */
        .quiz-container {
            position: relative;
            width: 85vw;
            max-width: 360px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Картинка аккуратно вписывается в экран телефона */
        .quiz-image {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }

        /* СКРЫТАЯ ССЫЛКА РЯДОМ С КОНТЕНТОМ В ПОЛЕ ЗРЕНИЯ */
        .hidden-link-bg {
            position: absolute;
            top: 20%;
            left: 0;
            width: 100%;
            text-align: center;
            color: #000000; /* Полностью невидима на черном */
            font-size: 14px;
            user-select: text;
            z-index: 1;
        }

        /* ХАКЕРСКОЕ ВЫДЕЛЕНИЕ */
        ::selection { 
            background: #001122; 
            color: #00ffcc; 
        }
        ::-webkit-selection { 
            background: #001122; 
            color: #00ffcc; 
        }

        /* ПЛЕЕР НАЛОЖЕН ПОВЕРХ НИЖНЕЙ ЧАСТИ ФОНА */
        .audio-controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 40px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            padding: 10px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            background: none;
            border: none;
            color: #777;
            font-family: monospace;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover, .btn:active {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hidden-link-bg">https://t.me/Caesar_Visionary_Photos</div>

    <div class="quiz-container">
        <img src="mid.jpg" alt="Core" class="quiz-image">

        <div class="audio-controls">
            <button class="btn" id="playBtn">▷</button>
            <a href="sound.wav" download="sound.wav" class="btn">⬇</a>
        </div>
    </div>

    <audio id="audioTrack" src="sound.wav"></audio>

    <script>
        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '||'; /* Строгий минималистичный знак паузы */
            } else {
                audio.pause();
                playBtn.textContent = '▷';  /* Строгий минималистичный знак плея */
            }
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▷';
        });
    </script>

</body>
</html>
